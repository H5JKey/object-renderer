name: C++ checks

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]



jobs:
  style:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run clang-format check
      uses: mrousavy/clang-format-action@v1
      with:
          clang-format-version: '18'
          check-path: 'renderer'
          clang-format-style-path: renderer/.clang-format

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build docker
      run: |
        DOCKER_BUILDKIT=1 docker build . --file renderer/Dockerfile --tag renderer --ignorefile renderer/.dockerignore
    - name: Run tests
      run: |
        docker run --rm renderer sh -c "cd build && valgrind --leak-check=full \
         --show-leak-kinds=all \
         --track-origins=yes \
         --error-exitcode=1 ./test"
