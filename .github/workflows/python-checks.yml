name: python-checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main2

jobs:
  lint:
    runs-on: ubuntu:latest
    defaults:
      working-directory: ./app
    steps:
      - name: clone git repository
        uses: actions/checkout@v4

      - name: install poetry
        run: pip install poetry

      - name: config poetry
        run: poetry config virtualenvs.create false

      - name: install dependencies
        run: poetry install

      - name: run black
        run: black . --check

      - name: run mypy
        run: mypy .

      - name: run ruff
        run: ruff check

