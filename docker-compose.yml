services:
  renderer:
    build:
      context: .
      dockerfile: renderer/Dockerfile
    container_name: renderer
    hostname: renderer
    depends_on:
      minio:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: app
    hostname: app
    environment:
      DATABASE__HOST: database
      DATABASE__PORT: 5432
      DATABASE__DB_NAME: renderer

      MINIO__HOST: minio
      MINIO__PORT: 9000

      MINIO__USERNAME: adminadmin
      MINIO__PASSWORD: adminadmin
    volumes:
      - "./app:/app"
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "localhost:8000/health"]
      start_period: 2s
      interval: 2s
      timeout: 2s
      retries: 3

  database:
    image: postgres:17-bookworm
    container_name: database
    hostname: database
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: renderer
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d renderer"]
      start_period: 3s
      interval: 2s
      timeout: 2s
      retries: 3

  minio:
    image: minio/minio
    container_name: minio
    hostname: minio
    command: server --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: adminadmin
      MINIO_ROOT_PASSWORD: adminadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f","http://localhost:9000/minio/health/ready"]
      start_period: 2s
      interval: 2s
      timeout: 2s
      retries: 3

volumes:
  minio_data:
  postgres_data: